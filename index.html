<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Comisiones</title>
    <link rel="stylesheet" href="ventas.css">
    <script src="ventas.js"></script>
    <script src="utilitarios.js"></script>
</head>
<body>

    <div class="contenedor">
        <h1>Calculadora de Comisiones</h1>

        <label for="txtSueldoBase">Salario Base</label>
        <input type="text" id="txtSueldoBase" placeholder="Ingrese el salario base">

        <label for="txtVentas">Número de ventas</label>
        <input type="text" id="txtVentas" placeholder="Ingrese la cantidad de ventas">

        <label for="txtPrecio">Precio del producto</label>
        <input type="text" id="txtPrecio" placeholder="Ingrese el precio del producto">

        <button onclick="calcular()">Calcular Comisión</button>

        <h2>Resultados</h2>
        <p>Salario Base: <span id="spSueldoBase"></span></p>
        <p>Comisión: <span id="spComision"></span></p>
        <p>Total: <span id="spTotal"></span></p>
    </div>

</body>
</html>
